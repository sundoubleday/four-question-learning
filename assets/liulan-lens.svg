<svg viewBox="0 0 680 386" width="100%" role="img">
  <title>刘澜思维透镜（作者视角层）</title>
  <desc>把方法 skill 叠加一层作者思维透镜：输入学习材料，经过刘澜的五个思维镜片（心智模型/决策启发式/表达DNA/反模式/诚实边界），输出既有方法又有刘澜怎么看的学习材料。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" font-size="15" font-weight="500" fill="#26215C">刘澜思维透镜 · 作者视角层</text>
  <text x="340" y="52" text-anchor="middle" font-size="12" font-weight="400" fill="#5F5E5A">把方法 skill 叠加一层作者思维透镜：既有怎么做，也有刘澜会怎么看</text>

  <rect x="40" y="90" width="120" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="100" y="106" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">学习材料</text>
  <text x="100" y="126" text-anchor="middle" font-size="11" font-weight="400" fill="#5F5E5A">书 / 经验 / 观点</text>

  <line x1="162" y1="116" x2="256" y2="116" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <ellipse cx="320" cy="116" rx="62" ry="48" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
  <text x="320" y="108" text-anchor="middle" font-size="15" font-weight="500" fill="#26215C">刘澜</text>
  <text x="320" y="130" text-anchor="middle" font-size="12" font-weight="400" fill="#3C3489">思维透镜</text>

  <line x1="384" y1="116" x2="518" y2="116" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="520" y="90" width="120" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="580" y="106" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">你的学习材料</text>
  <text x="580" y="126" text-anchor="middle" font-size="11" font-weight="400" fill="#5F5E5A">方法 + 刘澜怎么看</text>

  <text x="340" y="180" text-anchor="middle" font-size="12" font-weight="500" fill="#444441">透镜的 5 个镜片 · nuwa 五元组提取</text>

  <rect x="24" y="192" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="84" y="206" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">心智模型 ×6</text>
  <text x="84" y="224" text-anchor="middle" font-size="11" font-weight="400" fill="#534AB7">磁铁吸铁屑</text>

  <rect x="152" y="192" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="212" y="206" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">决策启发式 ×9</text>
  <text x="212" y="224" text-anchor="middle" font-size="11" font-weight="400" fill="#534AB7">看情况</text>

  <rect x="280" y="192" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="206" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">表达 DNA</text>
  <text x="340" y="224" text-anchor="middle" font-size="11" font-weight="400" fill="#534AB7">反问 · 口诀</text>

  <rect x="408" y="192" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="468" y="206" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">反模式</text>
  <text x="468" y="224" text-anchor="middle" font-size="11" font-weight="400" fill="#534AB7">标准答案思维</text>

  <rect x="536" y="192" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="596" y="206" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">诚实边界</text>
  <text x="596" y="224" text-anchor="middle" font-size="11" font-weight="400" fill="#534AB7">也是参考答案</text>

  <rect x="20" y="262" width="200" height="104" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="34" y="288" text-anchor="start" font-size="14" font-weight="500" fill="#2C2C2A">一、减法优先的反向镜片</text>
  <text x="34" y="314" text-anchor="start" font-size="12" font-weight="400" fill="#5F5E5A">成年人的大脑是写满错字的字纸，</text>
  <text x="34" y="334" text-anchor="start" font-size="12" font-weight="400" fill="#5F5E5A">学习先擦除再累加。</text>

  <rect x="240" y="262" width="200" height="104" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="254" y="288" text-anchor="start" font-size="14" font-weight="500" fill="#2C2C2A">二、参考答案元姿态</text>
  <text x="254" y="314" text-anchor="start" font-size="12" font-weight="400" fill="#5F5E5A">原理确信 · 应用谦卑——</text>
  <text x="254" y="334" text-anchor="start" font-size="12" font-weight="400" fill="#5F5E5A">世上没有标准答案。</text>

  <rect x="460" y="262" width="200" height="104" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="474" y="288" text-anchor="start" font-size="14" font-weight="500" fill="#2C2C2A">三、磁铁铁屑模式本体论</text>
  <text x="474" y="314" text-anchor="start" font-size="12" font-weight="400" fill="#5F5E5A">模式如磁铁，碎片如铁屑，</text>
  <text x="474" y="334" text-anchor="start" font-size="12" font-weight="400" fill="#5F5E5A">贯穿选书 · 学高手 · 迁移。</text>
</svg>
